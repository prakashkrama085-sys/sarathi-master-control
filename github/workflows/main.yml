name: Sarathi Master Control APK Builder
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🛠️ Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf \
          libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: 🚀 Build APK (Direct Mode)
        run: |
          # 'clean' कमांड को हटा दिया गया है ताकि FileNotFoundError न आए
          buildozer -v android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: 📦 Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Sarathi-Master-Control-v1
         path: bin/*.apk
