# 1. पक्का करें कि फोल्डर सही है
mkdir -p .github/workflows

# 2. वर्कफ़्लो फाइल को फिर से लिखें (साफ कोड)
cat <<EOF > .github/workflows/main.yml
name: Sarathi Builder
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Buildozer
        run: |
          pip install buildozer cython==0.29.33
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
      - name: Build APK
        run: buildozer -v android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: '1'
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sarathi-App
          path: bin/*.apk
EOF

# 3. ज़बरदस्ती GitHub पर भेजें (Force Push)
git add .github/workflows/main.yml
git commit -m "🔱 Start the Engine 🔱"
git push origin main
